<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orch UI</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-actions">
          <button id="sidebarToggle" class="icon-button sidebar-action sidebar-toggle" type="button" title="Projects" aria-label="Toggle projects" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16"></path>
            </svg>
          </button>
          <button id="newChat" class="icon-button sidebar-action new-chat-button" type="button" title="New chat" aria-label="New chat">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
          </button>
          <button id="tailscaleSetup" class="icon-button sidebar-action tailscale-button" type="button" title="Tailscale" aria-label="Tailscale setup">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 12a6 6 0 0 1 12 0"></path>
              <path d="M3 12a9 9 0 0 1 18 0"></path>
              <path d="M9 12a3 3 0 0 1 6 0"></path>
              <path d="M12 12h.01"></path>
            </svg>
          </button>
          <button id="soundToggle" class="icon-button sidebar-action preference-toggle" type="button" title="Sounds on" aria-label="Mute sounds" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M11 5 6 9H2v6h4l5 4V5z"></path>
              <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
              <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
            </svg>
          </button>
          <button id="speechToggle" class="icon-button sidebar-action preference-toggle" type="button" title="Speech off" aria-label="Read answers aloud" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 8h10"></path>
              <path d="M7 12h7"></path>
              <path d="M21 12c0 4.4-4 8-9 8a10 10 0 0 1-4-.8L3 21l1.6-4A7.3 7.3 0 0 1 3 12c0-4.4 4-8 9-8s9 3.6 9 8z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div id="sessionList" class="sessions" aria-label="Sessions"></div>
      <div id="status" class="model-status sidebar-status" aria-label="Model connection status"></div>
    </aside>

    <div id="projectContextMenu" class="project-context-menu" role="menu" hidden></div>

    <main class="main">
      <section id="messages" class="messages" aria-live="polite"></section>
      <button id="scrollToBottomButton" class="scroll-to-bottom-button" type="button" title="Jump to latest" aria-label="Jump to latest message" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </button>

      <form id="composer" class="composer">
        <div class="composer-shell">
          <div class="attachment-menu-wrap">
            <button id="attachmentMenuButton" class="attachment-menu-button" type="button" title="Upload file" aria-label="Upload file" aria-haspopup="menu" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14"></path>
              </svg>
            </button>
            <div id="attachmentMenu" class="attachment-menu" role="menu" hidden>
              <button type="button" role="menuitem" data-attach-action="files">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m21.4 11.6-8.8 8.8a6 6 0 0 1-8.5-8.5l9.7-9.7a4 4 0 0 1 5.7 5.7l-9.7 9.7a2 2 0 0 1-2.8-2.8l8.8-8.8"></path>
                </svg>
                <span>Upload file</span>
              </button>
            </div>
          </div>
          <div class="composer-main">
            <textarea id="messageInput" rows="1" placeholder="Ask the current supervisor..."></textarea>
            <div id="attachmentList" class="attachment-list"></div>
          </div>
          <button id="sendButton" type="submit" title="Send" aria-label="Send message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5M6 11l6-6 6 6"></path>
            </svg>
          </button>
          <input id="fileInput" type="file" multiple>
        </div>
      </form>
    </main>

    <dialog id="newChatDialog" class="modal">
      <form id="newChatForm" class="modal-panel">
        <div class="modal-head">
          <h2>New chat</h2>
          <button id="cancelNewChat" class="icon-button" type="button" aria-label="Close">x</button>
        </div>

        <div class="modal-field">
          <label for="modalProjectName">Project name</label>
          <input id="modalProjectName" list="projectOptions" autocomplete="off" maxlength="80" placeholder="project-folder">
          <datalist id="projectOptions"></datalist>
        </div>

        <div class="modal-field">
          <label for="modalSupervisorSelect">Supervisor</label>
          <select id="modalSupervisorSelect"></select>
        </div>

        <div id="modalError" class="modal-error" role="alert"></div>

        <div class="modal-actions">
          <button class="secondary" type="button" data-close-modal>Cancel</button>
          <button id="startNewChat" class="primary" type="submit">Start</button>
        </div>
      </form>
    </dialog>

    <dialog id="tailscaleDialog" class="modal tailscale-modal">
      <form id="tailscaleForm" class="modal-panel tailscale-panel">
        <div class="modal-head">
          <h2>Tailscale</h2>
          <button id="closeTailscale" class="icon-button" type="button" aria-label="Close">x</button>
        </div>

        <div class="tailscale-state">
          <span id="tailscaleStateDot" class="tailscale-state-dot"></span>
          <span id="tailscaleStateText">Not configured</span>
        </div>

        <div class="modal-field">
          <label for="tailscaleAuthKey">Auth key</label>
          <input id="tailscaleAuthKey" type="password" autocomplete="off" placeholder="tskey-auth-...">
        </div>

        <div class="modal-field">
          <label for="tailscaleHostname">Device name</label>
          <input id="tailscaleHostname" autocomplete="off" maxlength="63" placeholder="orch-ui">
        </div>

        <div class="modal-field">
          <label for="tailscaleHttpsHost">HTTPS host</label>
          <input id="tailscaleHttpsHost" autocomplete="off" placeholder="https://orch-ui.example.ts.net">
        </div>

        <div id="tailscaleStatus" class="modal-error" role="alert"></div>

        <div class="modal-actions">
          <button id="skipTailscale" class="secondary" type="button">Skip</button>
          <button id="saveTailscale" class="primary" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="connectDialog" class="modal connect-modal">
      <div class="modal-panel">
        <div class="modal-head">
          <h2>Connect</h2>
          <button id="closeConnect" class="icon-button" type="button" aria-label="Close">x</button>
        </div>

        <div id="connectionList" class="connection-list"></div>

        <div class="modal-actions">
          <button id="refreshConnections" class="secondary" type="button">Refresh</button>
          <button class="primary" type="button" data-close-connect>Done</button>
        </div>
      </div>
    </dialog>

    <dialog id="promptDialog" class="modal prompt-modal">
      <div class="modal-panel prompt-panel">
        <div class="modal-head">
          <h2>Model prompts</h2>
          <button id="closePrompts" class="icon-button" type="button" aria-label="Close">x</button>
        </div>

        <div id="promptTabs" class="prompt-tabs" role="tablist" aria-label="Model prompt tabs"></div>
        <textarea id="promptEditor" class="prompt-editor" spellcheck="false" placeholder="Prompt"></textarea>
        <div id="promptStatus" class="modal-error" role="alert"></div>

        <div class="modal-actions">
          <button id="resetPrompt" class="secondary prompt-reset-button" type="button">Reset canonical</button>
          <button class="secondary" type="button" data-close-prompts>Cancel</button>
          <button id="savePrompts" class="primary" type="button">Save</button>
        </div>
      </div>
    </dialog>

    <dialog id="modelDialog" class="modal model-modal">
      <div class="modal-panel model-panel">
        <div class="modal-head">
          <h2 id="modelDialogTitle">Model</h2>
          <button id="closeModelDialog" class="icon-button" type="button" aria-label="Close">x</button>
        </div>

        <div id="modelDialogTabs" class="prompt-tabs" role="tablist" aria-label="Model detail tabs"></div>
        <div id="modelConnectionPanel" class="model-tab-panel connection-list"></div>
        <div id="modelPromptPanel" class="model-tab-panel model-prompt-panel" hidden>
          <textarea id="modelPromptEditor" class="prompt-editor" spellcheck="false" placeholder="Prompt"></textarea>
          <div id="modelPromptStatus" class="modal-error" role="alert"></div>
          <div class="modal-actions">
            <button id="resetModelPrompt" class="secondary prompt-reset-button" type="button">Reset canonical</button>
            <button id="saveModelPrompt" class="primary" type="button">Save</button>
          </div>
        </div>
      </div>
    </dialog>

    <dialog id="terminalDialog" class="modal terminal-modal">
      <div class="modal-panel terminal-panel">
        <div class="modal-head">
          <h2 id="terminalTitle">Terminal</h2>
          <button id="closeTerminal" class="icon-button" type="button" aria-label="Close">x</button>
        </div>
        <div id="terminalTimeline" class="terminal-timeline" aria-label="Run timeline"></div>
        <pre id="terminalOutput" class="terminal-output">Waiting for terminal output...</pre>
      </div>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
