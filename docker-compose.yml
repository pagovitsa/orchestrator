name: orchestrator

services:
  orch-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    image: local/orchestrator:latest
    container_name: orch-ui
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      # Optional API keys: use these to authenticate the CLIs independently of the browser ChatGPT/
      # Google OAuth session (which rotates and can invalidate the CLI's stored token).
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      CODEX_ACCESS_TOKEN: "${CODEX_ACCESS_TOKEN:-}"
      CODEX_HOME: "/home/node/.codex"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      ORCH_AUTH_USER: "${ORCH_AUTH_USER:-orchestrator}"
      ORCH_AUTH_PASSWORD: "${ORCH_AUTH_PASSWORD:-}"
      ORCH_ALLOWED_HOSTS: "${ORCH_ALLOWED_HOSTS:-}"
      ORCH_ENABLED_TOOLS: "${ORCH_ENABLED_TOOLS:-serena,context7,memory,playwright}"
      ORCH_PLAYWRIGHT_EXECUTABLE_PATH: "${ORCH_PLAYWRIGHT_EXECUTABLE_PATH:-/usr/bin/chromium}"
      ORCH_PLAYWRIGHT_HEADLESS: "${ORCH_PLAYWRIGHT_HEADLESS:-1}"
      ORCH_PLAYWRIGHT_NO_SANDBOX: "${ORCH_PLAYWRIGHT_NO_SANDBOX:-1}"
      ORCH_GIT_INIT_PROJECTS: "${ORCH_GIT_INIT_PROJECTS:-1}"
      ORCH_DEFAULT_SUPERVISOR: "${ORCH_DEFAULT_SUPERVISOR:-claude}"
      ORCH_ALLOW_WRITE: "${ORCH_ALLOW_WRITE:-1}"
      ORCH_ALLOW_WORKSPACE_ROOT: "${ORCH_ALLOW_WORKSPACE_ROOT:-0}"
      ORCH_TIMEOUT_MS: "${ORCH_TIMEOUT_MS:-10800000}"
      ORCH_AUTOPILOT_IDLE_TIMEOUT_MS: "${ORCH_AUTOPILOT_IDLE_TIMEOUT_MS:-900000}"
      ORCH_AUTOPILOT_IDLE_WARNING_MS: "${ORCH_AUTOPILOT_IDLE_WARNING_MS:-60000}"
      ORCH_AUTOPILOT_DECISION_TIMEOUT_MS: "${ORCH_AUTOPILOT_DECISION_TIMEOUT_MS:-900000}"
      ORCH_AUTOPILOT_RETRY_ATTEMPTS: "${ORCH_AUTOPILOT_RETRY_ATTEMPTS:-3}"
      ORCH_AUTOPILOT_RETRY_BACKOFF_MS: "${ORCH_AUTOPILOT_RETRY_BACKOFF_MS:-2000}"
      ORCH_AUTOPILOT_FEED_LIMIT: "${ORCH_AUTOPILOT_FEED_LIMIT:-2}"
      ORCH_AUTOPILOT_SERVER_LOOP_MS: "${ORCH_AUTOPILOT_SERVER_LOOP_MS:-5000}"
      ORCH_USAGE_POLL_INTERVAL_MS: "${ORCH_USAGE_POLL_INTERVAL_MS:-300000}"
      ORCH_BUDGET_WARNING_USD: "${ORCH_BUDGET_WARNING_USD:-0}"
      ORCH_UPLOAD_MAX_BYTES: "${ORCH_UPLOAD_MAX_BYTES:-26214400}"
      ORCH_UPLOAD_INLINE_CHARS: "${ORCH_UPLOAD_INLINE_CHARS:-60000}"
      ORCH_AUTO_UPDATE_CLIS: "${ORCH_AUTO_UPDATE_CLIS:-1}"
      ORCH_CLI_PACKAGE_SPECS: "${ORCH_CLI_PACKAGE_SPECS:-@anthropic-ai/claude-code@latest @openai/codex@latest @google/gemini-cli@latest}"
      ORCH_CLI_UPDATE_TIMEOUT_SECONDS: "${ORCH_CLI_UPDATE_TIMEOUT_SECONDS:-120}"
      ORCH_NETWORK_MODE: "${ORCH_NETWORK_MODE:-bridge}"
      DOCKER_HOST: "${ORCH_DOCKER_HOST:-unix:///var/run/docker.sock}"
      ORCH_BIND_HOST: "${ORCH_BIND_HOST:-127.0.0.1}"
      ORCH_LISTEN_HOST: "${ORCH_LISTEN_HOST:-::}"
      ORCH_UI_PORT: "${ORCH_UI_PORT:-8787}"
      ORCH_DEV_SERVER_HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      ORCH_PREVIEW_BIND_HOST: "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}"
      ORCH_TAILSCALE_AUTHKEY: "${ORCH_TAILSCALE_AUTHKEY:-}"
      ORCH_TAILSCALE_HOSTNAME: "${ORCH_TAILSCALE_HOSTNAME:-orch-ui}"
      ORCH_TAILSCALE_HTTPS_HOST: "${ORCH_TAILSCALE_HTTPS_HOST:-}"
      ORCH_TAILSCALE_SERVE: "${ORCH_TAILSCALE_SERVE:-1}"
      ORCH_TAILSCALE_SERVE_RESET: "${ORCH_TAILSCALE_SERVE_RESET:-1}"
      ORCH_TAILSCALE_UI_HTTPS_PORT: "${ORCH_TAILSCALE_UI_HTTPS_PORT:-443}"
      ORCH_TAILSCALE_HOST: "${ORCH_TAILSCALE_HOST:-}"
      ORCH_LAN_HOST: "${ORCH_LAN_HOST:-}"
      ORCH_PREVIEW_PUBLIC_HOSTS: "${ORCH_PREVIEW_PUBLIC_HOSTS:-}"
      ORCH_PREVIEW_PORTS: "${ORCH_PREVIEW_PORTS:-3000-3020,5173-5190,8000-8020,8080-8090}"
      HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      BIND_HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      VITE_HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-opus-4-8}"
      CLAUDE_EFFORT: "${CLAUDE_EFFORT:-max}"
      CODEX_MODEL: "${CODEX_MODEL:-gpt-5.5}"
      CODEX_REASONING_EFFORT: "${CODEX_REASONING_EFFORT:-xhigh}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-3-pro-preview}"
    ports:
      - "${ORCH_BIND_HOST:-127.0.0.1}:${ORCH_UI_PORT:-8787}:8787"
      - "[${ORCH_BIND_HOST_IPV6:-::1}]:${ORCH_UI_PORT:-8787}:8787"
      # Codex browser-OAuth callback (localhost-only by design); reached via the in-container socat relay.
      - "127.0.0.1:1455:1455"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:3000-3020:3000-3020"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:5173-5190:5173-5190"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:8000-8020:8000-8020"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:8080-8090:8080-8090"
    volumes:
      - "${ORCH_HOST_PROJECTS:-${HOME}/orch-projects}:/workspace"
      - claude_auth:/home/node/.claude
      - codex_auth:/home/node/.codex
      - gemini_auth:/home/node/.gemini
      - orch_data:/data
      - "./prompts:/app/prompts:ro"
      - "${ORCH_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock"
    working_dir: /app

  tailscale:
    image: tailscale/tailscale:latest
    container_name: orch-tailscale
    restart: unless-stopped
    network_mode: "service:orch-ui"
    depends_on:
      - orch-ui
    environment:
      TS_AUTHKEY: "${ORCH_TAILSCALE_AUTHKEY:-}"
      TS_STATE_DIR: "/var/lib/tailscale"
      TS_HOSTNAME: "${ORCH_TAILSCALE_HOSTNAME:-orch-ui}"
      TS_EXTRA_ARGS: "${ORCH_TAILSCALE_EXTRA_ARGS:---accept-dns=false}"
      TS_AUTH_ONCE: "${ORCH_TAILSCALE_AUTH_ONCE:-true}"
      ORCH_TAILSCALE_CONFIG_ENV: "/data/tailscale/setup.env"
      ORCH_TAILSCALE_SERVE: "${ORCH_TAILSCALE_SERVE:-1}"
      ORCH_TAILSCALE_SERVE_RESET: "${ORCH_TAILSCALE_SERVE_RESET:-1}"
      ORCH_TAILSCALE_UI_PORT: "${ORCH_UI_PORT:-8787}"
      ORCH_TAILSCALE_UI_HTTPS_PORT: "${ORCH_TAILSCALE_UI_HTTPS_PORT:-443}"
      ORCH_TAILSCALE_PREVIEW_PORTS: "${ORCH_PREVIEW_PORTS:-3000-3020,5173-5190,8000-8020,8080-8090}"
    volumes:
      - tailscale_state:/var/lib/tailscale
      - orch_data:/data
      - "./tailscale:/orch-tailscale:ro"
    entrypoint:
      - /bin/sh
      - /orch-tailscale/start.sh

volumes:
  claude_auth:
    name: orch_claude_auth
  codex_auth:
    name: orch_codex_auth
  gemini_auth:
    name: orch_gemini_auth
  orch_data:
    name: orch_data
  tailscale_state:
    name: orch_tailscale_state
