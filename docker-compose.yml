services:
  orch-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    image: local/orchestrator:latest
    container_name: orch-ui
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      ORCH_AUTH_TOKEN: "${ORCH_AUTH_TOKEN:-}"
      ORCH_ALLOWED_HOSTS: "${ORCH_ALLOWED_HOSTS:-}"
      ORCH_ENABLED_TOOLS: "${ORCH_ENABLED_TOOLS:-serena,context7}"
      ORCH_GIT_INIT_PROJECTS: "${ORCH_GIT_INIT_PROJECTS:-1}"
      ORCH_DEFAULT_SUPERVISOR: "${ORCH_DEFAULT_SUPERVISOR:-claude}"
      ORCH_ALLOW_WRITE: "${ORCH_ALLOW_WRITE:-1}"
      ORCH_ALLOW_WORKSPACE_ROOT: "${ORCH_ALLOW_WORKSPACE_ROOT:-0}"
      ORCH_TIMEOUT_MS: "${ORCH_TIMEOUT_MS:-900000}"
      ORCH_UPLOAD_MAX_BYTES: "${ORCH_UPLOAD_MAX_BYTES:-26214400}"
      ORCH_AUTO_UPDATE_CLIS: "${ORCH_AUTO_UPDATE_CLIS:-0}"
      ORCH_CLI_PACKAGE_SPECS: "${ORCH_CLI_PACKAGE_SPECS:-@anthropic-ai/claude-code@latest @openai/codex@latest @google/gemini-cli@latest}"
      ORCH_CLI_UPDATE_TIMEOUT_SECONDS: "${ORCH_CLI_UPDATE_TIMEOUT_SECONDS:-120}"
      ORCH_NETWORK_MODE: "${ORCH_NETWORK_MODE:-bridge}"
      ORCH_BIND_HOST: "${ORCH_BIND_HOST:-127.0.0.1}"
      ORCH_LISTEN_HOST: "${ORCH_LISTEN_HOST:-::}"
      ORCH_UI_PORT: "${ORCH_UI_PORT:-8787}"
      ORCH_DEV_SERVER_HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      ORCH_PREVIEW_PORTS: "${ORCH_PREVIEW_PORTS:-3000-3020,5173-5190,8000-8020,8080-8090}"
      HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      BIND_HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      VITE_HOST: "${ORCH_DEV_SERVER_HOST:-0.0.0.0}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-}"
      CODEX_MODEL: "${CODEX_MODEL:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-}"
    ports:
      - "${ORCH_BIND_HOST:-127.0.0.1}:${ORCH_UI_PORT:-8787}:8787"
      - "[${ORCH_BIND_HOST_IPV6:-::1}]:${ORCH_UI_PORT:-8787}:8787"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:3000-3020:3000-3020"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:5173-5190:5173-5190"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:8000-8020:8000-8020"
      - "${ORCH_PREVIEW_BIND_HOST:-127.0.0.1}:8080-8090:8080-8090"
    volumes:
      - "${ORCH_HOST_PROJECTS:-${HOME}/orch-projects}:/workspace"
      - claude_auth:/home/node/.claude
      - codex_auth:/home/node/.codex
      - gemini_auth:/home/node/.gemini
      - orch_data:/data
      - "./prompts:/app/prompts:ro"
    working_dir: /app

volumes:
  claude_auth:
    name: orch_claude_auth
  codex_auth:
    name: orch_codex_auth
  gemini_auth:
    name: orch_gemini_auth
  orch_data:
    name: orch_data
